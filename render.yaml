services:
  - type: web
    name: demohomes-v1-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # Set in Render dashboard → MongoDB Atlas URI
      - key: JWT_SECRET
        sync: false          # Set in Render dashboard → strong random string
      - key: JWT_EXPIRE
        value: 7d
      - key: ADMIN_EMAIL
        sync: false          # Set in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false          # Set in Render dashboard
      - key: ADMIN_NAME
        value: Admin
      - key: CLOUDINARY_CLOUD_NAME
        sync: false          # Set in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false          # Set in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false          # Set in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set in Render dashboard → your Netlify URL
